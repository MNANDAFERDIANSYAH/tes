<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - BUMDes Bulu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #0a5d4a;
            --primary-maroon: #800f2f;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-green: #0a5d4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Container HP */
        .app-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        /* Header */
        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 { font-size: 1.1rem; color: var(--text-dark); font-weight: 700; }
        .back-btn { color: var(--primary-maroon); font-size: 1.2rem; cursor: pointer; }
        .edit-text { color: var(--primary-maroon); font-weight: 700; font-size: 0.9rem; cursor: pointer; }

        /* Profile Section */
        .profile-top {
            text-align: center;
            padding: 10px 0;
        }

        .image-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f1f5f9;
        }

        .camera-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--primary-green);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            font-size: 0.8rem;
        }

        .user-name { font-size: 1.2rem; font-weight: 800; color: var(--text-dark); }
        .user-badge {
            display: inline-block;
            background: #e6f2f0;
            color: var(--primary-green);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 8px;
        }

        /* Divider Daun */
        .leaf-divider {
            text-align: center;
            margin: 25px 0;
            color: var(--primary-green);
            position: relative;
        }
        .leaf-divider::before, .leaf-divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e2e8f0;
        }
        .leaf-divider::before { left: 5%; }
        .leaf-divider::after { right: 5%; }

        /* Form Profil */
        .profile-form { padding: 0 25px; margin-bottom: 100px; }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .input-group label span { color: var(--primary-maroon); }

        .input-wrapper {
            position: relative;
            background: white;
            border: 2px solid var(--primary-green);
            border-radius: 12px;
            overflow: hidden;
        }

        .input-wrapper input, .input-wrapper textarea {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: none;
            outline: none;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            resize: none;
        }

        .edit-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-green);
            font-size: 0.9rem;
        }

        .hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }

        /* Tombol Action */
        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-batal { background: white; color: var(--primary-maroon); border: 1.5px solid var(--primary-maroon); }
        .btn-simpan { background: var(--primary-green); color: white; }

        /* Bottom Navigation */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #f1f5f9;
        }

        .nav-item {
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--primary-maroon); }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <i class="fa-solid fa-arrow-left back-btn" onclick="history.back()"></i>
            <h2>Profil</h2>
            <span class="edit-text">Edit</span>
        </header>

        <div class="profile-top">
            <div class="image-container">
                <img src="pp.png" alt="Budi Santoso" class="profile-img">
                <div class="camera-icon">
                    <i class="fa-solid fa-camera"></i>
                </div>
            </div>
            <h3 class="user-name">Budi Santoso</h3>
            <span class="user-badge">Anggota BUMDes</span>
        </div>

        <div class="leaf-divider">
            <i class="fa-solid fa-leaf"></i>
        </div>

        <div class="profile-form">
            <div class="input-group">
                <label>Nama Lengkap <span>*</span></label>
                <div class="input-wrapper">
                    <input type="text" value="Budi Santoso">
                    <i class="fa-solid fa-pencil edit-icon"></i>
                </div>
                <p class="hint">Nama akan ditampilkan di aplikasi BUMDes Bulu.</p>
            </div>

            <div class="input-group">
                <label>Alamat <span>*</span></label>
                <div class="input-wrapper">
                    <textarea rows="2">Dusun Wonosari, Desa Bulu, Kecamatan Balen, Kabupaten Bojonegoro</textarea>
                    <i class="fa-solid fa-pencil edit-icon"></i>
                </div>
                <p class="hint">Alamat sesuai KTP atau domisili.</p>
            </div>

            <div class="input-group">
                <label>Pekerjaan <span>*</span></label>
                <div class="input-wrapper">
                    <input type="text" value="Petani">
                    <i class="fa-solid fa-pencil edit-icon"></i>
                </div>
                <p class="hint">Pilih pekerjaan utama Anda.</p>
            </div>

            <div class="action-btns">
                <button class="btn btn-batal">Batal</button>
                <button class="btn btn-simpan">Simpan</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                Beranda
            </a>
            <a href="pengajuan.html" class="nav-item">
                <i class="fa-regular fa-file-lines"></i>
                Pengajuan
            </a>
            <a href="pembayaran.html" class="nav-item">
                <i class="fa-regular fa-credit-card"></i>
                Pembayaran
            </a>
            <a href="riwayat.html" class="nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Riwayat
            </a>
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-user"></i>
                Profil
            </a>
        </nav>
    </div>

</body>
</html>
